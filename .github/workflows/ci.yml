name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      UV_INDEX_URL: https://pypi.org/simple

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Ignore repository lockfile in CI
        run: rm -f uv.lock

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run pyright

      - name: Build package
        run: uv build
